services:
  - type: web
    name: ecolife-receipt-ai-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://your-frontend-url.vercel.app
      - key: GEMINI_API_KEY
        value: ""
      - key: OPENAI_API_KEY
        value: ""
      - key: OCR_API_KEY
        value: ""
